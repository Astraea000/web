<!DOCTYPE html>
<html lang="zh-CN">
  <head>
     <meta charset="UTF-8">
     <title>个人博客</title>
     <style>
      *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      @font-face {
        font-family: myFont;
        src: url("alx.ttf") format("truetype");
      }
      @font-face {
        font-family: myFont1;
        src: url("alc.ttf") format("truetype");
      }
      .nav {
        position: fixed;
        top: 50%;
        right: 45px;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column; 
        gap: 50px;              
        font-size: 26px;
        font-family: myFont1;
      }
      .nav  a{
        color: aliceblue;
        text-decoration: none;
      }
      .nav a:hover {
        transform: scale(1.2);
        color: #ffffff;
        text-shadow: 0 0 10px rgba(255,255,255,0.5);
        transition: 0.35s; 
        display: inline-block;
      }
      .hidden{
        display: none;
        position: fixed;
        right: 180px;
        bottom: 50px;
        width: 200px;
        height: auto;
        z-index: 9999;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
      }
      #card{
        position: fixed;
        right: 200px;
        bottom: 237px;
        width: 200px;
        height: auto;
        display: none;
        z-index: 9999;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.3);
      }
      .title{
        text-align: right;
        color: rgb(255, 255, 255);
        font-family: myFont1;
        font-size: 35px;
        font-weight: 400;
        right: 50px;
      }
      .comment{
        position: absolute;
        top: 140px;
        right: 420px;
        text-align: center;
        gap: 20px;
        margin-top: 200px;
        margin-right: 250px;
        align-items: center;
      }
      #text1{
        font-family: myfont1;
        font-size: 70px;
        margin-bottom: 50px;
        color: rgb(255, 250, 240);
      }
      #text2{
        font-family: myfont;
        font-size: 40px;
        color: aliceblue;
        padding: 15px 20px;
        width: fit-content;
        border-radius: 15px;
        margin: 0 auto;
        background-color: rgba(0, 0, 0,0.7);
      }
      .pages1{
        background-image: url("background1.jpg");
        background-size: cover;
        background-position: center;
        height: 100vh;
      }
      .pages2{
        background-image: url("background2.jpg");
        background-size: cover;
        background-position: center; 
        height: 100vh;   
      }
     </style>
  </head>
  <body>
    <div class="comment">
      <p id="text1">学习倒影</p>
      <p id="text2">花明玉关雪，叶暖金窗烟。|</p>
    </div>
    <div class="pages1">
      <div class="title">
      <h1>
        Astraea的个人博客
      </h1>
    </div>
    <div class="nav">
          <a href="#home" id="home">🌸主页</a>
          <a href="#article" id="write">📜记录</a>
          <a href="#contact" id="contact">🌏联系</a>
          <a href="#set">🗝️百宝箱</a>
          <a href="#introduce" id="introduce">🍀关于笔者</a>
    </div>
    </div>
    <div class="pages2"></div>
    <div class="hidden" id="copy">
      <p>
        找个屁呢？
      </p>
    </div>
    <img src="card.png" id="card">
  </body>
  <script>
    let btn=document.querySelector("#contact");
    btn.onclick=function(){
      let text=document.getElementById("copy").innerText
      navigator.clipboard.writeText(text)
      alert("已复制联系方式")
    }
    let home = document.querySelector("#home");
    home.onclick = function (e) {
      e.preventDefault();
      window.scrollTo({
        top: 0,
        behavior: "smooth"
       });
    };
        let write = document.querySelector("#write");
    write.onclick = function (e) {
      e.preventDefault();
      window.scrollTo({
        top: window.innerHeight,
        behavior: "smooth"
       });
    };
    let introduce=document.querySelector("#introduce");
    let card=document.querySelector("#card");
    introduce.onmouseout=function(){
      card.style.display="none";
    }
    introduce.onmouseover=function(){
      card.style.display="block";
    }
  </script>
</html>
