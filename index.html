<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <!--网页编码，防止中文乱码-->
     <meta charset="UTF-8">
     <!--网页的标题，可以显示在浏览器标签上-->
     <title>个人博客</title>
     <style>
      /*全局样式重置，让盒子模型统一*/
      *{
        margin: 0;/*清除所有标签默认的外边距*/
        padding: 0;/*清楚所有标签默认的内边距*/
        box-sizing: border-box;/*统一盒子模型的尺寸*/
      }
      /*自定义字体，引入外部字体阿里健康体*/
      @font-face {
        font-family: myFont;/*字体的命名*/
        src: url("alx.ttf");/*引入*/
      }
      /*粗体的引入*/
      @font-face {
        font-family: myFont1;
        src: url("alc.ttf");
      }
      /*美化导航栏*/
      .nav {
        position: fixed;/*固定位置，不随页面而滚动*/
        top: 50%;/*距离顶部50%*/
        right: 45px;/*距离右侧45px*/
        transform: translateY(-50%);/*向上移动自身高度50%，实现居中*/
        display: flex;/*使用弹性布局*/
        flex-direction: column; /*让元素垂直排列*/
        gap: 50px;/*各项间距为50px*/            
        font-size: 26px;/*文字大小为26px*/
        font-family: myFont1;/*使用粗体*/
      }
      /*导航栏链接的美化*/
      .nav  a{
        color: aliceblue;/*链接文字为淡蓝色*/
        text-decoration: none;/*去掉默认的下划线*/
      }
      /*导航栏的进一步美化*/
      .nav a:hover {
        transform: scale(1.2);/*鼠标悬浮时放大1.2倍*/
        color: #ffffff;/*文字颜色变为纯白色*/
        /*白色发光阴影的效果，各项分别为水平偏移，垂直偏移，模糊程度，颜色*/
        /*正数阴影向右向下，负数相反，模糊程度数字越大越模糊，颜色最后一项为透明度*/
        text-shadow: 0 0 10px rgba(255,255,255,0.5);
        transition: 0.35s; /*动画过渡时间0.35，让画面更顺畅*/
        display: inline-block;/*设置为行内块元素，让缩放生效*/
      }
      /*隐藏的联系方式*/
      .hidden{
        display: none;/*不显示该元素*/
      }
      /*小卡片的美化*/
      #card{
        position: fixed;/*固定*/
        right: 200px;/*距离右侧200px*/
        bottom: 237px;/*距离底部237px*/
        width: 200px;/*图片宽度200px*/
        height: auto;/*高度自适应*/
        display: none;/*默认不显示*/
        z-index: 9999;/*层级最高，保证显示时出现在最上方*/
        border-radius: 10px;/*圆角10px*/
        box-shadow: 0 0 10px rgba(0,0,0,0.3);/*阴影*/
      }
      /*标题的美化*/
      .title{
        text-align: right;/*文字紧贴右面，右对齐*/
        color: rgb(255, 255, 255);/*颜色*/
        font-family: myFont1;/*字体*/
        font-size: 35px;/*大小*/
        font-weight: 400;/*文字粗细*/
      }
      /*中央区域文字的美化*/
      .comment{
        position: absolute;/*位置绝对*/
        top: 140px;/*距离顶部*/
        right: 420px;/*距离右面*/
        text-align: center;/*文字居中对齐*/
        gap: 20px;/*控制元素之间的间距，注意这里的元素不是某个字*/
        margin-top: 200px;/*上外边距200px*/
        margin-right: 250px;/*右外边距250px*/
        align-items: center;/*居中*/
      }
      /*第一行字的美化*/
      #text1{
        font-family: myfont1;/*字体*/
        font-size: 70px;/*大小*/
        margin-bottom: 50px;/*底部外边距*/
        color: rgb(255, 250, 240);/*颜色*/
      }
      /*第二行字的美化*/
      #text2{
        font-family: myfont;/*字体*/
        font-size: 40px;/*大小*/
        color: aliceblue;/*颜色*/
        padding: 15px 20px;/*上下左右内边距*/
        width: fit-content;/*宽度自适应文字大小*/
        border-radius: 15px;/*圆角*/
        margin: 0 auto;/*水平居中*/
        background-color: rgba(0, 0, 0,0.7);/*背景的美化*/
      }
      /*第一页背景图的美化*/
      .pages1{
        background-image: url("background1.jpg");/*引入图片*/
        background-size: cover;/*铺满*/
        background-position: center;/*居中*/
        height: 100vh;/*高度占满*/
      }
      /*第二页美化，内容同上*/
      .pages2{
        background-image: url("background2.jpg");
        background-size: cover;
        background-position: center; 
        height: 100vh;   
      }
     </style>
  </head>
  <!--网页主体部分-->
  <body>
    <div class="comment"><!--类选择器-->
      <p id="text1">学习倒影</p>
      <p id="text2">花明玉关雪，叶暖金窗烟。|</p>
    </div>
    <div class="pages1">
      <div class="title">
      <!--一级标题-->
      <h1>
        Astraea的个人博客
      </h1>
    </div>
    <!--导航栏容器-->
    <div class="nav">
          <a href="#home" id="home">🌸主页</a>
          <a href="#article" id="write">📜记录</a>
          <a href="#contact" id="contact">🌏联系</a>
          <a href="#set">🗝️百宝箱</a><!--百宝箱目前没有具体内容-->
          <a href="#introduce" id="introduce">🍀关于笔者</a>
    </div>
    </div>
    <div class="pages2"></div>
    <!--隐藏的文字容器-->
    <div class="hidden" id="copy">
      <p>
        找个屁呢？
      </p>
    </div>
    <!--图片容器-->
    <img src="card.png" id="card">
  </body>
  <!--js的交互功能部分-->
  <script>
    let btn=document.querySelector("#contact");//固定语法获取页面contact元素
    //按钮绑定固定事件
    btn.onclick=function(){
      let text=document.getElementById("copy").innerText//获取隐藏区域文本内容
      navigator.clipboard.writeText(text)//调用系统剪切板复制文本
      alert("已复制联系方式")//alert弹出提示框
    }

    let home = document.querySelector("#home");//获取home元素
    //按钮绑定固定事件
    home.onclick = function (e) {
      e.preventDefault();//阻止a标签的默认跳转行为
      //固定语法，页面滚动
      window.scrollTo({
        top: 0,//滚到顶部
        behavior: "smooth"//平滑滚动
       });
    };
    //内容同上
    let write = document.querySelector("#write");
    write.onclick = function (e) {
      e.preventDefault();
      window.scrollTo({
        top: window.innerHeight,//注意这里要滚到第二面，所以设置一屏高度
        behavior: "smooth"
       });
    };
    let introduce=document.querySelector("#introduce");//获取元素
    let card=document.querySelector("#card");//获取元素
    //绑定out移开事件
    introduce.onmouseout=function(){
      card.style.display="none";//none表示隐藏
    }
    //绑定over悬浮事件
    introduce.onmouseover=function(){
      card.style.display="block";//block表示显示
    }
  </script>
</html>
